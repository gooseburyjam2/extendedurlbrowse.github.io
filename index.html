<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goosebury Jam Browser // At-Home Edition</title>
    <style>
        /* Clean, Minimalist Google-Style Design Layer */
        body {
            background-color: #FFFFFF; /* Pure White background just like Google */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #202124;
        }
        .browser-container {
            width: 90%;
            max-width: 584px; /* Exact Google search bar desktop constraint width */
            text-align: center;
            position: relative;
        }
        .logo-text {
            font-size: 5.5rem;
            font-weight: bold;
            letter-spacing: -2px;
            margin-bottom: 25px;
            font-family: Arial, sans-serif;
        }
        .logo-g1 { color: #4285F4; } /* Blue */
        .logo-j  { color: #EA4335; } /* Red */
        .logo-b  { color: #FBBC05; } /* Yellow */
        .logo-r  { color: #4285F4; } /* Blue */
        .logo-o  { color: #34A853; } /* Green */
        .logo-w  { color: #EA4335; } /* Red */
        
        .logo-sub {
            font-size: 0.85rem;
            color: #5f6368;
            margin-top: -20px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }
        .search-box-wrapper {
            position: relative;
            width: 100%;
        }
        /* Exact layout cloning of a functional standard search engine pill bar */
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid #EFEFEF;
            border-radius: 24px;
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.18);
            box-sizing: border-box;
            transition: box-shadow 0.1s;
        }
        .search-bar:hover, .search-bar:focus {
            box-shadow: 0 2px 8px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .btn-container {
            margin-top: 25px;
        }
        .btn {
            background-color: #F8F9FA;
            border: 1px solid #F8F9FA;
            color: #3C4043;
            padding: 10px 16px;
            font-size: 14px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn:hover {
            border: 1px solid #C6C6C6;
            color: #202124;
            background-color: #F1F3F4;
        }
        /* Built-In 16-Bit HUD Plugin Sidebar Extension */
        .hud-plugin-sidebar {
            position: absolute;
            top: -40px;
            right: -240px;
            width: 200px;
            background-color: #FFFFFF;
            border: 2px solid #4285F4;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            padding: 12px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            box-sizing: border-box;
        }
        .plugin-title {
            background-color: #4285F4;
            color: white;
            padding: 2px 5px;
            font-weight: bold;
            text-align: center;
            margin-top: 0;
            margin-bottom: 8px;
        }
        .status-feed {
            background-color: #000000;
            color: #00FF00;
            padding: 6px;
            font-size: 0.75rem;
            height: 70px;
            overflow-y: auto;
            margin-top: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="browser-container">
    <!-- NATIVE 16-BIT BROWSER PLUGIN HUD SIDEBAR -->
    <div class="hud-plugin-sidebar">
        <p class="plugin-title">GJ PLUGIN v1.1</p>
        <strong>Sync ID:</strong> Remote<br>
        <strong>Tokens:</strong> Locked<br>
        <strong>Grid Tracking:</strong> Off
        <div class="status-feed" id="pluginFeed">
            [SYS] Engine idling. Open internet searches enabled.
        </div>
    </div>

    <!-- GOOGLE-STYLE RESORT BRANDING LOGO GRID -->
    <div class="logo-text">
        <span class="logo-g1">G</span><span class="logo-j">J</span><span class="logo-b">b</span><span class="logo-r">r</span><span class="logo-o">o</span><span class="logo-w">w</span>
    </div>
    <div class="logo-sub">At-Home Edition // Search Hub</div>

    <!-- TARGET SEARCH INTERCEPT FORM -->
    <form id="searchForm" onsubmit="executeGoogleSearch(event)">
        <div class="search-box-wrapper">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search Google or input custom cartoon extensions..." autocomplete="off" required>
        </div>
        <div class="btn-container">
            <button type="submit" class="btn">Google Search</button>
            <button type="button" class="btn" onclick="alert('You feel incredibly lucky to hold 1 of only 10 Deluxe Kits!')">I'm Feeling Wacky</button>
        </div>
    </form>
</div>

<script>
    function executeGoogleSearch(event) {
        event.preventDefault();
        const inputString = document.getElementById('searchInput').value.trim();
        const lowerInput = inputString.toLowerCase();
        const feed = document.getElementById('pluginFeed');
        
        feed.innerHTML += `<br>[PARSING] ${inputString}`;
        feed.scrollTop = feed.scrollHeight;

        // The Custom Local Extension Routing Intercept Matrix
        setTimeout(() => {
            if (lowerInput.endsWith('.prank')) {
                feed.innerHTML += `<br>[ROUTE] Forwarding to public repo.`;
                window.location.href = "https://gooseburyjam.github.io";
            } 
            else if (lowerInput.endsWith('.joke')) {
                feed.innerHTML += `<br>[ROUTE] Forwarding to bug tracker repository.`;
                window.location.href = "https://gooseburyjam2.github.io";
            } 
            else if (lowerInput.endsWith('.wacky')) {
                alert("ACCESS FORBIDDEN: Custom .wacky administration panels can only link up while connected inside the local campus router zone!");
                feed.innerHTML += `<br>[BLOCKED] Local IP route rejected.`;
            } 
            else {
                // FUNCTIONING GOOGLE SEARCH REDIRECT: Uses official query syntax parameters
                feed.innerHTML += `<br>[WEB] Transferring to google.com network...`;
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(inputString);
            }
        }, 500);
    }
</script>
</body>
</html>
